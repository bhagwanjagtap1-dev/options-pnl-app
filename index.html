<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F6E56">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Options P&L">
<title>Options P&L Calculator</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<style>
  :root {
    --bg: #F7F7F5;
    --card-bg: #FFFFFF;
    --text-primary: #1A1A18;
    --text-secondary: #5F5E5A;
    --text-tertiary: #888780;
    --border: rgba(0,0,0,0.12);
    --danger-bg: #FCEBEB;
    --danger-text: #791F1F;
    --success-bg: #EAF3DE;
    --success-text: #27500A;
    --info-bg: #E6F1FB;
    --info-text: #0C447C;
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1C1C1A;
      --card-bg: #262624;
      --text-primary: #F1EFE8;
      --text-secondary: #B4B2A9;
      --text-tertiary: #888780;
      --border: rgba(255,255,255,0.15);
      --danger-bg: #501313;
      --danger-text: #F7C1C1;
      --success-bg: #173404;
      --success-text: #C0DD97;
      --info-bg: #042C53;
      --info-text: #B5D4F4;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .container {
    max-width: 420px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }
  h1 {
    font-size: 19px;
    font-weight: 600;
    margin: 4px 0 20px;
    text-align: center;
  }
  label {
    font-size: 13px;
    color: var(--text-secondary);
    display: block;
    margin-bottom: 6px;
    font-weight: 500;
  }
  input {
    width: 100%;
    font-size: 17px;
    padding: 11px 12px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text-primary);
    outline: none;
  }
  input:focus {
    border-color: #185FA5;
    box-shadow: 0 0 0 2px rgba(24,95,165,0.2);
  }
  .field { margin-bottom: 14px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .label-danger { color: var(--danger-text); }
  .label-success { color: var(--success-text); }
  .divider {
    border-top: 1px solid var(--border);
    margin: 18px 0 16px;
  }
  .card {
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    margin-bottom: 12px;
  }
  .card-secondary { background: var(--card-bg); border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .card-danger { background: var(--danger-bg); }
  .card-success { background: var(--success-bg); }
  .card-info { background: var(--info-bg); display: flex; justify-content: space-between; align-items: center; }
  .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .card-label { font-size: 13px; margin: 0 0 4px; font-weight: 500; }
  .card-value { font-size: 22px; font-weight: 600; margin: 0; }
  .card-sub { font-size: 12px; margin: 4px 0 0; opacity: 0.85; }
  .error {
    font-size: 13px;
    color: var(--danger-text);
    background: var(--danger-bg);
    padding: 10px 12px;
    border-radius: var(--radius-md);
    margin-top: 4px;
    display: none;
  }
  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 24px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Options P&amp;L Calculator</h1>

  <div class="field">
    <label>Entry price (premium)</label>
    <input type="number" id="entry" inputmode="decimal" placeholder="e.g. 120.50">
  </div>

  <div class="row field">
    <div>
      <label>Qty per lot</label>
      <input type="number" id="qtyPerLot" inputmode="numeric" placeholder="e.g. 75">
    </div>
    <div>
      <label>No. of lots</label>
      <input type="number" id="numLots" inputmode="numeric" placeholder="e.g. 2">
    </div>
  </div>

  <div class="row field">
    <div>
      <label class="label-danger">Stop loss (price)</label>
      <input type="number" id="slPrice" inputmode="decimal" placeholder="e.g. 95">
    </div>
    <div>
      <label class="label-success">Target (price)</label>
      <input type="number" id="targetPrice" inputmode="decimal" placeholder="e.g. 160">
    </div>
  </div>

  <div class="divider"></div>

  <div class="card card-secondary">
    <div>
      <p class="card-label" style="color: var(--text-secondary);">Total quantity</p>
      <p class="card-sub" id="qty-note" style="color: var(--text-tertiary);">&nbsp;</p>
    </div>
    <p class="card-value" id="totalQty">0</p>
  </div>

  <div class="stat-row">
    <div class="card card-danger">
      <p class="card-label" style="color: var(--danger-text);">Max loss (at SL)</p>
      <p class="card-value" style="color: var(--danger-text);" id="maxLoss">&#8377;0</p>
      <p class="card-sub" style="color: var(--danger-text);" id="lossPoints">0 pts</p>
    </div>
    <div class="card card-success">
      <p class="card-label" style="color: var(--success-text);">Max profit (at target)</p>
      <p class="card-value" style="color: var(--success-text);" id="maxProfit">&#8377;0</p>
      <p class="card-sub" style="color: var(--success-text);" id="profitPoints">0 pts</p>
    </div>
  </div>

  <div class="card card-info">
    <p style="font-size: 14px; color: var(--info-text); margin: 0; font-weight: 600;">Risk : reward</p>
    <p style="font-size: 22px; font-weight: 600; margin: 0; color: var(--info-text);" id="rrRatio">&mdash;</p>
  </div>

  <p class="error" id="errorMsg"></p>

  <p class="footer-note">Calculates locally on your device. No data is sent or stored anywhere.</p>
</div>

<script>
const inputs = ['entry', 'qtyPerLot', 'numLots', 'slPrice', 'targetPrice'];
inputs.forEach(id => {
  document.getElementById(id).addEventListener('input', calculate);
});

function fmtCurrency(n) {
  const rounded = Math.round(n);
  return '\u20b9' + Math.abs(rounded).toLocaleString('en-IN') + (rounded < 0 ? ' loss' : '');
}

function calculate() {
  const entry = parseFloat(document.getElementById('entry').value);
  const qtyPerLot = parseFloat(document.getElementById('qtyPerLot').value);
  const numLots = parseFloat(document.getElementById('numLots').value);
  const slPrice = parseFloat(document.getElementById('slPrice').value);
  const targetPrice = parseFloat(document.getElementById('targetPrice').value);

  const errorEl = document.getElementById('errorMsg');
  errorEl.style.display = 'none';

  const totalQty = (qtyPerLot > 0 && numLots > 0) ? qtyPerLot * numLots : 0;
  document.getElementById('totalQty').textContent = totalQty.toLocaleString('en-IN');
  document.getElementById('qty-note').textContent = (qtyPerLot > 0 && numLots > 0) ? (qtyPerLot + ' x ' + numLots + ' lots') : ' ';

  if (!entry || !totalQty) {
    document.getElementById('maxLoss').textContent = '\u20b90';
    document.getElementById('maxProfit').textContent = '\u20b90';
    document.getElementById('lossPoints').textContent = '0 pts';
    document.getElementById('profitPoints').textContent = '0 pts';
    document.getElementById('rrRatio').textContent = '\u2014';
    return;
  }

  let lossPerUnit = 0;
  let profitPerUnit = 0;
  let hasInvalidSL = false;
  let hasInvalidTarget = false;

  if (slPrice >= 0 && !isNaN(slPrice)) {
    lossPerUnit = entry - slPrice;
    if (slPrice >= entry) hasInvalidSL = true;
  }
  if (targetPrice >= 0 && !isNaN(targetPrice)) {
    profitPerUnit = targetPrice - entry;
    if (targetPrice <= entry) hasInvalidTarget = true;
  }

  const maxLossAmount = lossPerUnit * totalQty;
  const maxProfitAmount = profitPerUnit * totalQty;

  document.getElementById('maxLoss').textContent = maxLossAmount > 0 ? fmtCurrency(-maxLossAmount) : '\u20b90';
  document.getElementById('lossPoints').textContent = Math.abs(Math.round(lossPerUnit * 100) / 100) + ' pts/unit';

  document.getElementById('maxProfit').textContent = maxProfitAmount > 0 ? fmtCurrency(maxProfitAmount) : '\u20b90';
  document.getElementById('profitPoints').textContent = Math.abs(Math.round(profitPerUnit * 100) / 100) + ' pts/unit';

  if (maxLossAmount > 0 && maxProfitAmount > 0) {
    const ratio = maxProfitAmount / maxLossAmount;
    document.getElementById('rrRatio').textContent = '1 : ' + (Math.round(ratio * 100) / 100);
  } else {
    document.getElementById('rrRatio').textContent = '\u2014';
  }

  if (hasInvalidSL || hasInvalidTarget) {
    let msg = [];
    if (hasInvalidSL) msg.push('Stop loss should be below entry price');
    if (hasInvalidTarget) msg.push('Target should be above entry price');
    errorEl.textContent = msg.join('. ');
    errorEl.style.display = 'block';
  }
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
